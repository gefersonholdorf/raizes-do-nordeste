<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cadastro</title>

<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/style.css">

</head>

<body>

<header>

<div class="container">

<div class="logo">

🌽 Raízes do Nordeste

</div>

</div>

</header>

<div class="container">

<div class="card">

<h2>Criar Conta</h2>

<form id="cadastroForm">

<input
id="nome"
placeholder="Nome completo"
required>

<input
id="emailCadastro"
type="email"
placeholder="Email"
required>

<input
id="telefone"
placeholder="Telefone"
required>

<input
id="cpf"
placeholder="CPF"
required>

<input
id="senhaCadastro"
type="password"
placeholder="Senha"
required>

<label>

<input
type="checkbox"
id="lgpd"
required>

Aceito a Política de Privacidade (LGPD)

</label>

<br><br>

<button class="btn">

Cadastrar

</button>

</form>

</div>

</div>

<script src="js/auth.js"></script>

</body>
</html>
